<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="DoctorSaaS">
  <!-- Container: rounded square / squircle -->
  <rect width="48" height="48" rx="10" fill="#0F172A"/>

  <!-- DS Geometric Monogram — Angular construction with diagonal growth vector -->
  <!-- Outer D frame: left bar -->
  <rect x="9" y="9" width="4.5" height="30" fill="#22C55E"/>
  <!-- D top bar -->
  <rect x="9" y="9" width="20" height="4.5" fill="#22C55E"/>
  <!-- D bottom bar -->
  <rect x="9" y="34.5" width="20" height="4.5" fill="#22C55E"/>
  <!-- D right side: two angled panels forming a faceted D shape -->
  <polygon points="29,13.5 39,24 29,34.5 24,34.5 34,24 24,13.5" fill="#22C55E"/>

  <!-- S diagonal cuts: create the interlocked S shape via negative space -->
  <!-- Upper diagonal slash (bottom-left to top-right) — the growth vector -->
  <polygon points="13.5,9 29,9 39,24 24.5,24" fill="#0F172A" opacity="0.85"/>
  <!-- Lower diagonal slash -->
  <polygon points="13.5,39 29,39 24.5,24 9,24" fill="#0F172A" opacity="0.85"/>

  <!-- Accent: top-right corner upward arrow hint (strategic direction) -->
  <polygon points="35,9 39,9 39,13" fill="#22C55E" opacity="0.7"/>
</svg>
